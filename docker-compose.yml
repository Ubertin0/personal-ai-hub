version: '3.8'

services:
  # 1. Корпоративный UI (ChatGPT Next Web)
  chat-ui:
    image: yidadaa/chatgpt-next-web:latest
    container_name: secure-ai-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - ai_secure_net
    env_file:
      - .env
    depends_on:
      - xray-router

  # 2. Ядро маршрутизации (Xray)
  xray-router:
    image: enwaiax/x-ui:latest # Или любой другой образ 3x-ui, который ты используешь
    container_name: xray-core
    restart: unless-stopped
    ports:
      - "2053:2053" # Порт панели управления
    networks:
      - ai_secure_net
    volumes:
      - ./xray/db/:/etc/x-ui/
      - ./xray/cert/:/root/cert/

  # 3. Прокси-слой (Cloudflare WARP)
  warp-proxy:
    image: caomingjun/warp:latest
    container_name: warp-socks5
    restart: unless-stopped
    networks:
      - ai_secure_net
    environment:
      - WARP_SLEEP=2
    cap_add:
      - NET_ADMIN

networks:
  ai_secure_net:
    driver: bridge
    name: ai_corporate_bridge
